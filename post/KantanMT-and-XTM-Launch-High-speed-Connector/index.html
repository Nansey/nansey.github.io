              <p>语言服务提供商（LSP）<a href="https://www.kantanmt.com/">KantanMT</a>和<a href="https://xtm.cloud/">XTM</a>合作开发了一个新的<a href="https://kantanmt.com/displayarticle.php?id=YJuhUhIAACIAqzYU&amp;slug=kantanmt-and-xtm-partner-to-provide-a-seamless-integration-with-a-high-speed-nmt-solution">连接器</a>，使XTM云翻译管理软件的用户能够通过KantanMT的平台访问高速神经机器翻译（<a href="https://en.wikipedia.org/wiki/Neural_machine_translation">NMT</a>）。该连接器使用户能够集成KantanMT的NMT系统，同时通过XTM进行管理。</p>
