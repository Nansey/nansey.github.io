            <div class="post-date">2021-05-10</div>
            
            <div class="post-content" v-pre>
              <p>在收购 <a href="https://www.lingua-world.de/en.htm">Lingua World</a> 之后，<a href="https://www.getranet.de/">GEtraNet</a> 正式加入了德国十大语言服务提供商（LSP）的行列。<a href="https://www.proventis.com/german-translation-network-ag-beim-zukauf-der-lingua-world-gmbh-von-proventis-partners-begleitet">该项收购</a>于4月30日正式签署，也使得 GEtraNet 进入了<a href="https://www.nimdzi.com/nimdzi-100-top-lsp/">世界最大的100家 LSP</a> 名单。该公司将接管 Lingua World 在德国的所有办事处。</p>
