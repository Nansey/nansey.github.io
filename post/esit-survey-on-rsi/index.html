            <h2 class="post-title">巴黎高翻问卷调查 RSI</h2>
            <div class="post-date">2021-04-18</div>
            
            <div class="post-content" v-pre>
              <p>近日，巴黎高翻(<a href="http://www.univ-paris3.fr/bienvenue-sur-le-site-de-l-esit-63854.kjsp">ESIT</a>)启动了一项远程同传（<a href="https://www.ata-chronicle.online/cover-feature/remote-simultaneous-interpreting-the-upside-and-downside/">RSI</a>）相关研究，通过问卷形式搜集了来自7个地区19个国家946名职业译员的意见（样本涵盖私人市场、国际组织、欧洲机构和公共管理部门的企业译员和自由译员，其中78%的受访者还是口译专业协会的成员）。</p>
<!-- more -->
<p>问卷涵盖会议时长、客户来源、工作条件、工作表现、搭档合作等方面内容，以期反映疫情发生至今远程口译市场的变化趋势。详细的调查结果见<a href="https://sites.google.com/aiic.net/study-on-remote-simultaneous-i/home?fbclid=IwAR3N16Znn0iO41XQXwgGviMvllAgwCFo1FmeU4QOqZu7JASrCcXQdXT5Wz8">这里</a>。</p>
