            <h2 class="post-title">上外第三届多语种接力同传赛开启报名</h2>
            <div class="post-date">2021-04-28</div>
            
            <div class="post-content" v-pre>
              <p>经多语种接力同传赛组委会讨论，由<a href="http://www.shisu.edu.cn/">上海外国语大学</a>主办由高级翻译学院承办的上海外国语大学第三届多语种接力同传赛将于2021年5月6日开放报名，报名截止时间为5月21日，于5月底进行初赛，6月中旬公布决赛参赛名单，7月4日在上海外国语大学虹口校区举行总决赛。</p>
<!-- more -->
