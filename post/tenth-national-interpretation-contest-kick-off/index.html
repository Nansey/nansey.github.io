            <h2 class="post-title">第十届全国口译大赛即将开赛</h2>
            <div class="post-date">2021-05-13</div>
            
            <div class="post-content" v-pre>
              <p>据@中国翻译协会 公众号消息，<a href="http://www.tac-online.org.cn/">中国翻译协会</a>将于2021年3月至2021年10月举办第十届全国口译大赛（英语）。大赛由<a href="http://www.cipg.org.cn/">中国外文局</a>指导，由中国翻译协会语言服务行业创业创新中心和<a href="https://www.tiit.com.cn/">北京甲申同文翻译有限公司</a>承办，由中国翻译协会口译委员会协办。</p>
<!-- more -->
<p>大赛的详细细则和报名方式请参考中国译协的<a href="https://mp.weixin.qq.com/s/U8exFBmHJmPKw_uGLW3ChA">这篇推送</a>。</p>
