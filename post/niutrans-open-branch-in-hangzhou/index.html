            <h2 class="post-title">小牛翻译在杭州成立分公司</h2>
            <div class="post-date">2021-04-17</div>
            
            <div class="post-content" v-pre>
              <p>据<a href="https://niutrans.com/">小牛翻译</a>官方<a href="https://mp.weixin.qq.com/s/1bPvTWwh4ScD1cfOuPA-AQ">消息</a>，2021年4月17日，<a href="https://www.qcc.com/firm/ab2c4f4bdf29a552a1485a7d87fbbafb.html">小牛雅译（杭州）科技有限公司</a>于杭州举办开业仪式。</p>
<!-- more -->
<p>小牛雅译（杭州）科技有限公司由<a href="https://www.qcc.com/firm/8b678e122147461cf707166d7569ea3a.html">沈阳雅译科技有限公司</a>全资创立，主要开展小牛翻译云平台的研发、运营及维护工作，打造一站式机器翻译 <a href="https://en.wikipedia.org/wiki/Software_as_a_service">SaaS</a> 服务平台。小牛翻译创始人<a href="http://www.cse.neu.edu.cn/2019/0303/c6664a159450/page.htm">朱靖波</a>、CEO <a href="https://www.x-mol.com/university/faculty/249056">肖桐</a>、总裁张春良以及小牛翻译名誉董事长、国内机器翻译领域专家王宝库教授等多位领导共同出席了开业仪式。</p>
