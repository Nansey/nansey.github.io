            <h2 class="post-title">研究人员利用人工智能翻译鲸语</h2>
            <div class="post-date">2021-05-05</div>
            
            <div class="post-content" v-pre>
              <p>据 Multilingual <a href="https://multilingual.com/researchers-use-ai-to-translate-whale-communication/?utm_source=ZohoCampaigns&amp;utm_campaign=MultiLingual+News+Weekly&amp;utm_medium=email">报道</a>，<a href="https://www.tamu.edu/">德州农工大学</a>的一个研究小组目前正在利用人工智能（AI）领域的最新进展，以翻译一种相当不寻常的交流形式：抹香鲸的发声。</p>
<!-- more -->
<p>研究人员已获得了大量鲸鱼为相互交流而发出的不同敲击和发声数据，他们相信过去几年人工智能技术和机器学习的改进可以使我们开发出翻译系统，从而使人类能够理解鲸鱼的复杂交流系统。</p>
