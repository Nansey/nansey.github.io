            <h2 class="post-title">葡萄牙外交官推动葡语在联合国的地位</h2>
            <div class="post-date">2021-05-14</div>
            
            <div class="post-content" v-pre>
              <p>葡萄牙外交部长 <a href="https://www.portugal.gov.pt/en/gc22/ministries/foreign-affairs">Augusto Santos Silva</a> 在一次新闻<a href="https://www.heraldnews.com/story/news/local/ojornal/2021/04/26/portugal-wants-portuguese-official-un-language-but-theres-long-road-ahead-says-minister/7386764002/">发布会</a>上表示，他计划倡导联合国（UN）将葡萄牙语采纳为其官方语言。Santos Silva 在发布会上讨论了5月5日<a href="https://en.unesco.org/commemorations/portuguese-language-day">世界葡萄牙语日</a>的计划。作为世界上使用最广泛的十种语言之一，葡萄牙语也是一些联合国组织的工作语言，如<a href="https://en.unesco.org/">联合国教科文组织</a>。不过，葡语要在联合国取得官方地位，还有很长的路要走。</p>
