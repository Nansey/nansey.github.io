            <h2 class="post-title">第九届“海伦·斯诺翻译奖”竞赛开放报名</h2>
            <div class="post-date">2021-04-09</div>
            
            <div class="post-content" v-pre>
              <p>据@陕西省翻译协会 <a href="https://mp.weixin.qq.com/s/rMhBSMj71zAwuhHh8BUPFA?scene=25#wechat_redirect">消息</a>，第九届“海伦·斯诺翻译奖”竞赛于2021年4月1日至5月31日举行, 由<a href="http://www.chsta.org/">陕西省翻译协会</a>、<a href="http://ccess.pku.edu.cn/">北京大学中国埃德加·斯诺研究中心</a>、<a href="https://www.suu.edu/">美国南犹他大学</a>和<a href="https://www.nwu.edu.cn/">西北大学</a>共同主办。</p>
<!-- more -->
<p>竞赛分为“英译汉”、“汉译英”两个组别。英文参赛题选自海伦·斯诺的原著；汉语参赛题选自国内外著名学者撰写的有关海伦·斯诺的文章。详细的赛事信息参见<a href="https://mp.weixin.qq.com/s/rMhBSMj71zAwuhHh8BUPFA?scene=25#wechat_redirect">这里</a>。</p>
