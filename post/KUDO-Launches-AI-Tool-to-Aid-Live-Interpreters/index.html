            <div class="post-content" v-pre>
              <p>基于云的多语言会议平台 <a href="https://kudoway.com/">KUDO</a> 最近推出了一个人工智能（AI）工具，以帮助现场口译员为口译任务做准备。该工具被称为KUDO口译员辅助工具（<a href="https://kudoway.com/kudo-interpreter-assist-artificial-intelligence/?inf_contact_key=91e537da1a42c2eb71d63272da14ecd77e470d92b8b75168d98a0b8cac0e9c09">KUDO Interpreter Assist</a>），可以为口译员创建词汇表，节约准备时间。它目前正在分级推出，本周早些时候，KUDO专业口译员率先获得了这项技术。</p>
