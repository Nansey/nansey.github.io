              <p>据 <a href="https://www.androidpolice.com/2021/05/04/youtubes-new-translation-experiment-lets-you-browse-titles-in-your-native-tongue/">Android Police</a> 发现，YouTube 现在多了一个翻译功能，可自动把英语视频的标题、描述和字幕翻成特定外文，目前看到的有葡萄牙语和土耳其语。</p>
