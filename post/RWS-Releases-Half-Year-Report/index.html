            <div class="post-date">2021-06-02</div>
            
            <div class="post-content" v-pre>
              <p>RWS 周二公布了截至2021年3月31日的六个月期间的<a href="https://webassets.rws.com/images/RWS-Board-changes-080621-final_tcm228-191944.pdf">业绩</a>，业绩显示公司增长迅速。该公司在2021年上半年的收入为3.244亿英镑，几乎是2020年上半年的两倍。RWS 在公告中表示，收入达到了董事会对今年上半年的预期，并对公司在下半年的持续增长充满信心。</p>
<!-- more -->
<p>RWS主席<a href="https://www.rws.com/about/investors/directors/andrew-brode/">Andrew Brode</a>说：“对集团来说，这是转型的六个月，收购SDL使我们成为语言服务和技术的全球领导者。</p>
