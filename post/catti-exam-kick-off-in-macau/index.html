            <h2 class="post-title">CATTI 首度在澳门开考</h2>
            <div class="post-date">2021-06-20</div>
            
            <div class="post-content" v-pre>
              <p>据@中国外文局 <a href="https://mp.weixin.qq.com/s/OAieP4XIzNkVVG6VPmY57Q">消息</a>，6月19日至20日，2021年上半年全国翻译专业资格(水平) 考试在全国各省市、自治区及澳门特别行政区举行。本次考试是全国翻译专业资格(水平) 考试开考以来的第35次考试，设英、日、法、阿、葡等5个语种1至3级考试，其中葡萄牙语是首次在澳门和内地同步开考。本次澳门考区考点设在澳门理工大学，开设类别包括英语和葡语的1至3级口笔译。</p>
