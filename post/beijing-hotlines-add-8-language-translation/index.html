            <h2 class="post-title">北京110等公共热线将设8语种远程翻译</h2>
            <div class="post-date">2021-03-24</div>
            
            <div class="post-content" v-pre>
              <p>据《北京青年报》<a href="http://epaper.ynet.com/html/2021-03/25/content_371984.htm?div=-1">报道</a>，为更好地服务<a href="https://www.beijing2022.cn/">北京2022年冬奥会</a>和冬残奥会，<a href="http://wb.beijing.gov.cn/">北京市外办</a>牵头编制了北京市“<a href="http://www.bj.xinhuanet.com/2021-03/25/c_1127252479.htm">迎冬奥，促提升</a>”国际语言环境建设专项行动方案。</p>
<!-- more -->
<p>确定五个专项行动13项具体任务，包括为110、119、120、122、999和12345等公共热线提供8语种高质量远程翻译服务，增强公共服务热线外语服务能力等。</p>
