            <h2 class="post-title">商务印书馆首次出版许渊冲汉译全集</h2>
            <div class="post-date">2021-04-17</div>
            
            <div class="post-content" v-pre>
              <p>著名翻译家许渊冲在近日举行的以“<a href="https://mp.weixin.qq.com/s/dRI7A89eFDarbJJthJL3lg">100岁的美与快活</a>”为主题的发布会上侃侃而谈。</p>
<!-- more -->
<p>今年4月18日，许渊冲将迎来100岁寿诞，<a href="https://www.cp.com.cn/">商务印书馆</a>为历时近两年打磨，制作“<a href="https://book.douban.com/series/56158">许渊冲汉译经典全集</a>”。日前，这套书第一辑于4月初上市，全部为许渊冲从英文翻译成中文的经典戏剧作品，包括“<a href="https://book.douban.com/subject/35424042/">莎士比亚戏剧精选</a>”14本和“<a href="https://book.douban.com/subject/35423888/">王尔德戏剧全集</a>”6本（8个戏剧作品）。</p>
