            <h2 class="post-title">2021中国公共政策翻译论坛将于3月30日-31日举行</h2>
            <div class="post-date">2021-03-29</div>
            
            <div class="post-content" v-pre>
              <p>2021中国公共政策翻译论坛暨大师工作坊云讲座定于2021年3月30日-31日<a href="https://www.bisu.edu.cn/art/2021/3/27/art_9923_265292.html">举行</a>。本次论坛由<a href="https://zh.wikipedia.org/zh-hans/%E4%B8%AD%E5%9B%BD%E7%BF%BB%E8%AF%91%E7%A0%94%E7%A9%B6%E9%99%A2">中国翻译研究院</a>、<a href="https://www.bisu.edu.cn/">北京第二外国语第二外国语学院</a>共同主办，<a href="http://cappt.bisu.edu.cn/">北二外中国公共政策翻译研究院</a>、<a href="http://www.tac-online.org.cn/index.php?m=content&amp;c=index&amp;a=show&amp;catid=396&amp;id=3058">中国翻译协会对外话语体系研究委员会</a>、<a href="http://www.accws.org.cn/">当代中国与世界研究院</a>对外话语创新研究中心承办。</p>
<!-- more -->
<p>本次论坛以<a href="https://meeting.tencent.com/">腾讯会议</a>形式召开，将通过<a href="https://ttv.cn/">译直播</a>平台播放，可点击<a href="https://ttv.cn/conference-contest">此链接</a>进入译直播平台。</p>
