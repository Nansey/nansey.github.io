            <h2 class="post-title">西奈山采用新的远程医疗口译平台</h2>
            <div class="post-date">2021-06-06</div>
            
            <div class="post-content" v-pre>
              <p>自从COVID-19大流行开始以来，远程医疗预约已经成为生活中不可或缺的一部分——但对于英语水平有限（<a href="https://www.lep.gov/">LEP</a>）的人来说，这并不容易。纽约市<a href="https://www.mountsinai.org/">西奈山</a>医疗系统最近采用了一个<a href="https://www.healthcareitnews.com/news/mount-sinai-eases-translation-200-languages-through-its-epic-telehealth-platform">新的平台</a>，使英语水平有限的病人更容易进行远程医疗预约，以便在远程预约期间提供更好的医疗翻译服务。</p>
