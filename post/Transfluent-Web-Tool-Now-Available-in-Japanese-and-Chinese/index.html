            <div class="post-date">2021-06-04</div>
            
            <div class="post-content" v-pre>
              <p><a href="https://www.transfluent.com/">Transfluent</a>是一家旨在帮助客户服务代表和其他业务经理与多语种客户无缝沟通的公司，最近在其基于网络的机器翻译（<a href="https://www.transfluent.com/en/translate/#!/add-text">MT</a>）系统的可用语言名册中增加了日语和中文。除了最近增加的语言外，Transfluent 的 Web Tool 现在还支持英语、西班牙语、芬兰语和瑞典语。</p>
