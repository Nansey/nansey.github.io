            <h2 class="post-title">耶鲁大学将从2022年起发放翻译证书</h2>
            <div class="post-date">2021-05-04</div>
            
            <div class="post-content" v-pre>
              <p>毕业时获得一纸耶鲁大学的翻译研究证书（Certificate）正在变为现实。据《耶鲁大学日报》2021年4月26日的<a href="https://yaledailynews.com/blog/2021/04/26/yale-translation-initiative-announces-new-certificates/">一篇报道</a>，下个学年，这所常春藤大学将开始发放翻译研究的研究生和本科生证书。</p>
<!-- more -->
<p>该项目将向所有学生开放，不分专业。耶鲁大学以法学传统而闻名，<a href="https://www.usnews.com/best-colleges/yale-university-1426">最新数据</a>显示，该校最受欢迎的专业包括社会科学、生物医学科学、历史、工程和数学。</p>
