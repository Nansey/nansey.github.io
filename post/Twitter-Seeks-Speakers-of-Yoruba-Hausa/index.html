            <h2 class="post-title">推特寻找会讲约鲁巴语、豪萨语等语言的人</h2>
            <div class="post-date">2021-05-09</div>
            
            <div class="post-content" v-pre>
              <p>最近在加纳阿克拉开设新的非洲办事处之后，Twitter <a href="https://careers.twitter.com/en/work-for-twitter/202104/cbf4dff8-3a82-409b-bc59-b089c465b810/7c8c66ea-bead-401c-af1b-9eb703d88a74.html/curation-lead-editorial-curation.html">宣布</a>，它正在寻找讲尼日利亚和加纳各种语言的人，以分析这些语言的新闻内容。该公司的主要目标是<a href="https://en.wikipedia.org/wiki/List_of_English-based_pidgins">洋泾浜英语</a>、<a href="https://en.wikipedia.org/wiki/Yoruba_language">约鲁巴语</a>、<a href="https://en.wikipedia.org/wiki/Igbo_language">伊博语</a>和<a href="https://en.wikipedia.org/wiki/Hausa_language">豪萨语</a>，他们需要能用这些语言进行策划和翻译文章的人。</p>
