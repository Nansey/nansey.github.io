            <h2 class="post-title">CATTI 与澳门理工学院合作签约</h2>
            <div class="post-date">2021-03-29</div>
            
            <div class="post-content" v-pre>
              <p>3月25日，中国外文局 <a href="http://www.catticenter.com/xmgljs">CATTI 项目中心</a>与<a href="https://www.ipm.edu.mo/zh/index.php">澳门理工学院</a>通过视频连线方式举行了合作签约仪式，双方将合作推进翻译资格考试在澳门设立考点相关工作。开考仪式将于6月在澳门举行。</p>
<!-- more -->
<p>全国翻译专业资格（水平）考试将于2021年6月在澳门举行中英、中葡翻译资格考试。双方还将在共建葡语基地、师资培训、图书版权合作等多方面展开合作。（<a href="https://mp.weixin.qq.com/s/L7NTDFeE2glHs_sDbYNxDQ">来源</a>）</p>
