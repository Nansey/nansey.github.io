            <div class="post-date">2021-04-14</div>
            
            <div class="post-content" v-pre>
              <p>4月13日消息，百度与<a href="https://www.logitech.com.cn/zh-cn">罗技</a>联合发布了 VOICE M380 语音鼠标。其中搭载了<a href="https://ai.baidu.com/tech/speech">百度语音识别</a>和<a href="https://fanyi.baidu.com/">机器翻译</a>两大技术，据说中文语音识别率可达98.6%，具有每分钟400字的听写能力。</p>
<!-- more -->
<p>M380鼠标具有多国语音输入、语音翻译、中英自由说和离在线语音四大性能。支持8种语言翻译。</p>
