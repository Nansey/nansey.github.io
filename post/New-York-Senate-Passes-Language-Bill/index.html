            <h2 class="post-title">纽约参议院通过增加语言的法案</h2>
            <div class="post-date">2021-05-07</div>
            
            <div class="post-content" v-pre>
              <p>一项要求纽约州机构网站提供12种最广泛使用语言翻译的<a href="https://www.nysenate.gov/legislation/bills/2021/s4716">法案</a>最近在州参议院获得通过。在该法案被民主党占多数的州议会通过和州长 <a href="https://www.governor.ny.gov/">Andrew Cuomo</a> 批准后，该州须在30天内翻译与 COVID-19 有关的网页，并在90天内翻译州机构所有其他的网页。</p>
<!-- more -->
<p>纽约是美国语言最多样化的州之一，大约有560万家庭语言为非英语的居民。</p>
