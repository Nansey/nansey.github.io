            <h2 class="post-title">第二届全国商务翻译大赛</h2>
            <div class="post-date">2021-03-20</div>
            
            <div class="post-content" v-pre>
              <p>据上经贸大国际商务外语学院<a href="https://mp.weixin.qq.com/s/ZWR8AQurUcApm5SUb6fMKA">公众号</a>，<a href="http://www.suibe.edu.cn/">上海对外经贸大学</a>将隆重举办第二届全国商务翻译大赛，由<a href="https://cnti.gdufs.edu.cn/">全国翻译专业学位教育指导委员会</a>、<a href="https://baike.baidu.com/item/%E4%B8%AD%E5%A4%96%E8%AF%AD%E8%A8%80%E6%96%87%E5%8C%96%E6%AF%94%E8%BE%83%E5%AD%A6%E4%BC%9A">中外语言文化比较学会</a>、<a href="http://www.sssa.org.cn/swwxh.htm">上海市外文学会</a>等多家学术组织对大赛进行专业指导。大赛将于5月-7月举行，分为初赛和决赛两个环节，邀请知名翻译专家进行评审。</p>
<!-- more -->
<p>参赛者可登录上海对外经贸大学国际商务外语学院<a href="http://www.suibe.edu.cn/wyxy/">官方网站</a>，随时关注大赛的公告和通知。</p>
