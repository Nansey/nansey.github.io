            <h2 class="post-title">谷歌Pixel手机原生支持截屏翻译</h2>
            <div class="post-date">2021-05-02</div>
            
            <div class="post-content" v-pre>
              <p>据外媒 XDA <a href="https://www.xda-developers.com/android-12-app-ui-translation/">报道</a>，当用户使用 Pixel 手机进行截屏时，如果检测到图片中包含外文，系统就会在手机屏幕底部显示一个翻译按钮，用户点击该按钮就可以进行翻译。</p>
<!-- more -->
<p>IT之家了解到，该功能也不是十分完美，有时候图片里有英文也会显示翻译为英文，不过整体处于可用状态。该功能已向搭载 Android 11 的 Pixel 手机推出。</p>
