            <h2 class="post-title">机器翻译的未来</h2>
            <div class="post-date">2021-03-18</div>
            
            <div class="post-content" v-pre>
              <p><a href="https://www.lionbridge.com/">Lionbridge</a> 日前发表<a href="https://mp.weixin.qq.com/s/OotiHQ7CMedpbd8V0aK1Kw">博文</a>指出，由于创建的内容量前所未有地增多，企业不得不寻找方法来快速高效地翻译其文本。机器翻译 (<a href="https://en.wikipedia.org/wiki/Machine_translation">MT</a>) 得到越来越广泛的应用，但远未达到相当成熟和完善的程度。机器翻译译文质量低下一直是长期存在的问题。</p>
<!-- more -->
<p>Lionbridge 在博文中探讨影响机器翻译发展的因素，并阐释如何充分利用这项技术来制定卓有成效的本地化战略。</p>
