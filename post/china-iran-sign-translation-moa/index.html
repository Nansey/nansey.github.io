            <h2 class="post-title">中伊签署经典著作互译出版备忘录</h2>
            <div class="post-date">2021-03-17</div>
            
            <div class="post-content" v-pre>
              <p>据新华社<a href="http://www.xinhuanet.com/world/2021-03/16/c_1127216899.htm">消息</a>，2021年3月16日，中国和伊朗以交换文本的方式签署了《中华人民共和国国家新闻出版署与伊朗伊斯兰共和国伊斯兰文化联络组织关于经典著作互译出版的备忘录》。</p>
<!-- more -->
<p>中宣部副部长张建春、伊朗伊斯兰文化联络组织主席艾布扎里·易卜拉希米·土勒凯曼博士代表双方在备忘录上签字。根据备忘录，中伊双方约定在未来5年内，共同翻译出版50种两国经典著作。</p>
