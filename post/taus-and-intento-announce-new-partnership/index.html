            <div class="post-date">2021-04-30</div>
            
            <div class="post-content" v-pre>
              <p><a href="https://www.taus.net/">TAUS</a> 和 <a href="https://inten.to/">Intento</a> 这两家专门从事语言数据和机器翻译的公司正通过合作建立国际伙伴关系，专注于训练更高效更有效的机器翻译（MT）模型。两家公司希望，通过将 TAUS 在语言数据服务方面的专长与 Intento 在机器翻译（MT）训练和评估方面的优势相结合，从而扩充其 MT 领域的版图。（<a href="https://multilingual.com/taus-and-intento-announce-new-partnership/?utm_source=ZohoCampaigns&amp;utm_campaign=MultiLingual+News+Weekly&amp;utm_medium=email">来源</a>）</p>
