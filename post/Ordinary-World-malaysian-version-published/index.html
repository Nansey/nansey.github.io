            <h2 class="post-title">《平凡的世界》首次出版马来文版</h2>
            <div class="post-date">2021-04-21</div>
            
            <div class="post-content" v-pre>
              <p>4月21日，由<a href="http://bph.com.cn/">北京出版集团</a>与马来西亚汉文化中心联合主办的“《<a href="https://m.douban.com/book/subject/1200840/">平凡的世界</a>》马来文版新书发布会暨路遥系列作品海外分享会”，以“线上+线下”的方式在中马两地同步举行。活动现场，中马双方代表共同为《平凡的世界》马来文版揭幕，并互赠中文、马来文图书留念。</p>
<!-- more -->
<p>另外，双方将进一步加深合作，翻译出版另一部茅盾文学奖获奖作品《穆斯林的葬礼》马来文版。</p>
