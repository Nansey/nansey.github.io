            <h2 class="post-title">千名缅语翻译志愿投入抗疫一线</h2>
            <div class="post-date">2021-04-03</div>
            
            <div class="post-content" v-pre>
              <p>据新浪微博@云南发布 <a href="https://share.api.weibo.cn/share/213755895.html?weibo_id=4621914562366002">消息</a>，高度疑似引起瑞丽疫情的病毒通过人或物从<a href="http://www.xinhuanet.com/local/2021-04/03/c_1127291260.htm">缅甸输入</a>。疫情发生后，省州市三级外事系统立即启动应急预案，<a href="https://www.sohu.com/a/458902465_367071">实施</a>《缅语译员调度方案》并启用“缅语译员调度中心”，通过原有120名骨干译员联络招募缅语翻译志愿者。</p>
<!-- more -->
<p>截至目前，共集合1546名翻译志愿者投入核酸采样、流调溯源、转运救治和疫苗接种等各项防控工作。</p>
